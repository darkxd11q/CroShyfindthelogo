<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin - Find the Hidden Logo</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<div id="login-view" class="admin-wrap" style="display:none;">
  <div class="login-card">
    <h2>Admin Access</h2>
    <p class="sub">Enter the admin password to continue</p>
    <form id="login-form">
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required>
      <button type="submit" class="btn-primary" style="width:100%;">Log in</button>
    </form>
    <div class="form-msg error" id="login-error" style="margin-top:10px;"></div>
  </div>
</div>

<div id="dashboard-view" class="admin-wrap" style="display:none;">
  <div class="admin-header">
    <h1>Admin <span>Dashboard</span></h1>
    <button class="btn-ghost" id="logout-btn">Log out</button>
  </div>

  <div class="upload-card">
    <strong>Upload a new puzzle photo</strong>
    <input type="file" id="upload-input" accept="image/png,image/jpeg,image/webp,image/gif">
    <button class="btn-mini primary" id="upload-btn">Upload</button>
    <span id="upload-status" style="font-family:var(--font-mono); font-size:12px; color:var(--text-dim);"></span>
  </div>

  <div class="section-eyebrow">All puzzle images</div>
  <div class="image-grid" id="image-grid"></div>
</div>

<div class="editor-overlay" id="editor-overlay" style="display:none;">
  <div class="editor-panel">
    <h3>Set the hidden logo location</h3>
    <p class="hint">Click directly on the spot where the logo is hidden. Drag the slider to set how forgiving a click can be.</p>
    <div class="editor-photo" id="editor-photo">
      <img id="editor-img" src="" alt="Puzzle photo">
    </div>
    <div class="editor-controls">
      <span>Click tolerance: <strong id="tolerance-value">30</strong>px</span>
      <input type="range" id="tolerance-slider" min="10" max="150" value="30">
    </div>
    <div class="editor-actions">
      <button class="btn-mini" id="editor-cancel">Cancel</button>
      <button class="btn-mini primary" id="editor-save">Save logo location</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/admin.js"></script>
</body>
</html>
