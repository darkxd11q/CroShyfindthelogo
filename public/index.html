<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Find the Hidden Logo</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="wrap">

  <header class="site-header">
    <div>
      <h1 class="site-title">FIND THE <span>LOGO</span></h1>
      <div class="site-tag">Sweep the photo. A mark is hiding somewhere in it.</div>
    </div>
    <a class="admin-link" href="/admin.html">Admin</a>
  </header>

  <main id="game-area">
    <div class="case-card">
      <div class="case-label" id="case-label">Exhibit</div>
      <div id="photo-zone">
        <div class="empty-state">Loading case file&hellip;</div>
      </div>
    </div>

    <div class="vote-row" id="vote-row" style="display:none;">
      <button class="vote-btn like" id="like-btn" type="button">
        <span aria-hidden="true">&#128077;</span> Like <span class="count" id="like-count">0</span>
      </button>
      <button class="vote-btn dislike" id="dislike-btn" type="button">
        <span aria-hidden="true">&#128078;</span> Dislike <span class="count" id="dislike-count">0</span>
      </button>
    </div>

    <section class="comments-section" id="comments-section" style="display:none;">
      <div class="section-eyebrow">Leave a note</div>
      <form class="comment-form" id="comment-form">
        <input type="text" id="comment-name" maxlength="50" placeholder="Your name" autocomplete="off" required>
        <textarea id="comment-text" maxlength="500" placeholder="What gave it away?" required></textarea>
        <div class="row">
          <span class="char-count" id="char-count">500 left</span>
          <button class="btn-primary" type="submit">Post comment</button>
        </div>
        <div class="form-msg" id="form-msg"></div>
      </form>

      <div class="section-eyebrow" style="margin-top:22px;">Notes from other players</div>
      <ul class="comment-list" id="comment-list"></ul>
    </section>
  </main>

</div>
<script src="/js/app.js"></script>
</body>
</html>
